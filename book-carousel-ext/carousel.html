<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Carosello</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #000;
      --border: #1e1e1e;
      --text: #ffffff;
      --muted: #666;
      --accent: #a78bfa;
      --header-h: 52px;
      --footer-h: 100px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
      background: rgba(0,0,0,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; z-index: 100;
    }
    #header .brand {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
    }
    #header .chapter-badge {
      font-size: 12px; color: var(--accent);
      background: rgba(167,139,250,0.12); border: 1px solid rgba(167,139,250,0.25);
      padding: 5px 14px; border-radius: 20px; letter-spacing: 0.5px; font-weight: 600;
    }
    #slide-counter {
      font-size: 13px; color: var(--muted); letter-spacing: 0.5px; font-weight: 500;
      min-width: 44px; text-align: right;
    }

    /* ── Carousel track ── */
    #carousel-wrapper {
      position: fixed;
      top: var(--header-h);
      bottom: var(--footer-h);
      left: 0; right: 0;
      overflow: hidden;
    }
    #slides-track {
      display: flex; height: 100%;
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
      will-change: transform;
    }

    /* ── Single slide ── */
    .slide {
      flex: 0 0 100%; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 20px 22px; position: relative; overflow: hidden;
    }
    .slide-bg { position: absolute; inset: 0; pointer-events: none; }
    .slide:nth-child(1)  .slide-bg { background: radial-gradient(ellipse at 20% 50%, rgba(102,126,234,.10) 0%, transparent 65%); }
    .slide:nth-child(2)  .slide-bg { background: radial-gradient(ellipse at 80% 30%, rgba(167,139,250,.10) 0%, transparent 65%); }
    .slide:nth-child(3)  .slide-bg { background: radial-gradient(ellipse at 50% 80%, rgba(74,222,128,.08) 0%, transparent 65%); }
    .slide:nth-child(4)  .slide-bg { background: radial-gradient(ellipse at 10% 20%, rgba(251,191,36,.08) 0%, transparent 65%); }
    .slide:nth-child(5)  .slide-bg { background: radial-gradient(ellipse at 90% 70%, rgba(248,113,113,.08) 0%, transparent 65%); }
    .slide:nth-child(6)  .slide-bg { background: radial-gradient(ellipse at 30% 60%, rgba(56,189,248,.08) 0%, transparent 65%); }
    .slide:nth-child(7)  .slide-bg { background: radial-gradient(ellipse at 70% 20%, rgba(167,139,250,.10) 0%, transparent 65%); }
    .slide:nth-child(8)  .slide-bg { background: radial-gradient(ellipse at 20% 80%, rgba(74,222,128,.08) 0%, transparent 65%); }
    .slide:nth-child(9)  .slide-bg { background: radial-gradient(ellipse at 80% 50%, rgba(102,126,234,.10) 0%, transparent 65%); }
    .slide:nth-child(10) .slide-bg { background: radial-gradient(ellipse at 50% 20%, rgba(251,191,36,.08) 0%, transparent 65%); }

    .slide-content {
      position: relative; width: 100%; max-width: 600px; z-index: 1;
    }
    .slide-num {
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .slide-num::after { content:''; flex:1; height:1px; background:var(--border); max-width:40px; }

    .slide-emoji {
      font-size: 56px; margin-bottom: 16px; display: block; line-height: 1;
    }

    .slide-title {
      font-size: clamp(26px, 6vw, 38px);
      font-weight: 800; line-height: 1.2;
      letter-spacing: -0.5px; margin-bottom: 18px;
      background: linear-gradient(135deg, #fff 0%, #ccc 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .slide-body {
      font-size: clamp(16px, 4vw, 20px);
      line-height: 1.75; color: #d0d0d0;
    }
    .slide-body p { margin-bottom: 10px; }
    .slide-body p:last-child { margin-bottom: 0; }
    .slide-body ul { list-style: none; }
    .slide-body ul li {
      padding: 7px 0 7px 24px; position: relative;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .slide-body ul li:last-child { border-bottom: none; }
    .slide-body ul li::before {
      content: '—'; position: absolute; left: 0; color: var(--accent); font-weight: 700;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .slide.active .slide-content { animation: fadeUp 0.35s ease forwards; }

    /* ── Nav arrows (hidden on narrow screens, swipe is primary) ── */
    #nav-prev, #nav-next {
      position: fixed; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px;
      background: rgba(255,255,255,.06); border: 1px solid var(--border);
      border-radius: 50%; color: #fff; font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s; z-index: 50;
    }
    #nav-prev { left: 8px; } #nav-next { right: 8px; }
    #nav-prev:hover, #nav-next:hover { background: rgba(255,255,255,.14); }
    #nav-prev:disabled, #nav-next:disabled { opacity: .15; cursor: default; }

    /* On very narrow screens hide the side arrows and rely on swipe */
    @media (max-width: 400px) {
      #nav-prev, #nav-next { display: none; }
      .slide { padding: 16px 18px; }
    }

    /* ── Footer ── */
    #bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: var(--footer-h);
      background: rgba(0,0,0,0.97); backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      padding: 0 20px;
    }

    /* Dots */
    #dots { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%; background: #2a2a2a;
      cursor: pointer; transition: all .3s; touch-action: manipulation;
    }
    .dot.active { background: #fff; width: 24px; border-radius: 4px; }

    /* Swipe hint */
    #swipe-hint {
      font-size: 11px; color: #333; letter-spacing: 1px;
      display: flex; align-items: center; gap: 6px;
      transition: opacity .5s;
    }
    #swipe-hint.hidden { opacity: 0; pointer-events: none; }

    /* Next chapter button */
    #btn-next-chapter {
      padding: 11px 28px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.5px;
      transition: opacity .2s, transform .1s;
      display: flex; align-items: center; gap: 8px;
      touch-action: manipulation;
    }
    #btn-next-chapter:active { transform: scale(.96); }
    #btn-next-chapter:disabled { opacity: .35; cursor: not-allowed; transform: none; }

    /* ── Generation overlay ── */
    #gen-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.9);
      backdrop-filter: blur(10px); z-index: 200;
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      padding: 32px;
    }
    #gen-overlay.visible { display: flex; }
    #gen-overlay .spin {
      width: 40px; height: 40px; border: 3px solid #222;
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    #gen-overlay .gen-label {
      font-size: 16px; color: #bbb; letter-spacing: 0.5px; text-align: center; font-weight: 600;
    }
    #gen-overlay .gen-step  {
      font-size: 13px; color: #555; letter-spacing: 0.3px; text-align: center;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Loading screen ── */
    #loading {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    #loading .spin { width:32px;height:32px;border:3px solid #222;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite; }
    #loading p { color:#444;font-size:13px;letter-spacing:1px; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: calc(var(--footer-h) + 12px); left: 50%;
      transform: translateX(-50%);
      background: #2a0a0a; color: #f87171; border: 1px solid #5a1a1a;
      padding: 12px 22px; border-radius: 10px; font-size: 13px;
      display: none; z-index: 300; max-width: 90vw; text-align: center; line-height: 1.4;
    }
    #toast.visible { display: block; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <p>Caricamento carosello...</p>
</div>

<div id="header" style="display:none">
  <div class="brand">📖 Book</div>
  <div class="chapter-badge" id="chapter-badge">Capitolo 1</div>
  <div id="slide-counter">1 / 8</div>
</div>

<div id="carousel-wrapper" style="display:none">
  <div id="slides-track"></div>
</div>

<button id="nav-prev" style="display:none">‹</button>
<button id="nav-next" style="display:none">›</button>

<div id="bottom-bar" style="display:none">
  <div id="dots"></div>
  <div id="swipe-hint">← scorri →</div>
  <button id="btn-next-chapter">✨ Genera Capitolo 2</button>
</div>

<div id="gen-overlay">
  <div class="spin"></div>
  <div class="gen-label" id="gen-label">Invio a ChatGPT...</div>
  <div class="gen-step"  id="gen-step"></div>
</div>

<div id="toast"></div>

<script src="carousel.js"></script>
</body>
</html>
